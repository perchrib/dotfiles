# Reload config file (useful when editing this file, and not really anytime else)
bind r source-file ~/.tmux.conf\; display-message "Config reloaded..."

# Enable full mouse support
set -g mouse on

# Start windows and panes index at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows on window close
set -g renumber-windows on

# Move status bar to the top
set -g status-position top

# Set vim keybindings when in copy mode
setw -g mode-keys vi

# Set clipboard on
set -g set-clipboard on

# Move between panes using leader + h/j/k/l, like vim
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Clear status bar right side
# set -g status-right ""

# List of plugins
# Install Plugins with leader-I (ctrl-b I)
set -g @plugin 'tmux-plugins/tpm'


setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
